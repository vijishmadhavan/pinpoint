name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn httpx pytest pytest-cov ruff
          pip install python-multipart openpyxl pillow watchdog pydantic python-dotenv pdfplumber numpy pandas requests python-docx PyMuPDF matplotlib

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -q --tb=short -s
