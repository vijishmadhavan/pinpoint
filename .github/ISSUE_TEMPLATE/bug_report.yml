name: Bug Report
description: Report a reproducible problem in Pinpoint
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep it concrete and reproducible.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, commands, or messages needed to reproduce the issue.
      placeholder: |
        1. Start the API with ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, install method, and any relevant optional setup.
      placeholder: |
        OS:
        Python:
        Node:
        Install method:
        Gemini configured:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste the relevant traceback, API response, or bot output.
      render: text
  - type: textarea
    id: scope
    attributes:
      label: Affected area
      description: Search, indexing, bot, packaging, media workflow, memory, etc.
