name: Feature Request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem first, then the feature you want.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Explain the user need or workflow gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want from Pinpoint.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other approaches if any.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search
        - Indexing
        - WhatsApp bot
        - File operations
        - Data analysis
        - Media/photos
        - Memory
        - Packaging/install
        - Documentation
        - Other
    validations:
      required: true
