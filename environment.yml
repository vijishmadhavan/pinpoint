name: pinpoint
channels:
  - conda-forge
dependencies:
  - python=3.11
  - nodejs=20
  - pip
  - ffmpeg
  - tesseract
  - ripgrep
  - pip:
      - fastapi
      - uvicorn
      - python-dotenv
      - python-multipart
      - requests
      - httpx
      - pydantic
      - numpy
      - pandas
      - pillow
      - pillow-heif
      - matplotlib
      - google-genai
      - openpyxl
      - pymupdf4llm
      - pdfplumber
      - markitdown
      - python-docx
      - readability-lxml
      - html2text
      - pyyaml
      - chonkie
      - watchdog
      - pytest
      - ruff

# Notes:
# - This is a practical baseline environment for local development.
# - Some optional features may need extra system or Python dependencies depending on your platform.
# - The WhatsApp bot still needs `npm install` inside `bot/`.
